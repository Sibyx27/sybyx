<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SIBYX — Méthode SEO en 16 piliers">
  <defs>
    <pattern id="weave" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 20 L40 20 M20 0 L20 40" stroke="#B8893C" stroke-width="0.6" opacity="0.18"/>
      <circle cx="20" cy="20" r="1.6" fill="#B8893C" opacity="0.28"/>
    </pattern>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12294C"/>
      <stop offset="1" stop-color="#0A1A30"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#weave)"/>

  <!-- Cercles concentriques décor -->
  <g transform="translate(980 315)" fill="none" stroke="#B8893C" opacity="0.5">
    <circle r="220" stroke-width="0.8" opacity="0.35"/>
    <circle r="160" stroke-width="0.7" opacity="0.3"/>
    <circle r="100" stroke-width="0.6" opacity="0.25"/>
  </g>

  <!-- Texte -->
  <g font-family="'Fraunces','Times New Roman',Georgia,serif" fill="#FAF6EE">
    <text x="90" y="150" font-size="34" letter-spacing="6" fill="#E4C98A">SIBYX · INTELLIGENCE DIGITALE</text>
    <text x="88" y="300" font-size="92" font-weight="600">Méthode SEO</text>
    <text x="90" y="392" font-size="56" font-style="italic" fill="#E4C98A">16 piliers, de l’idée à la machine.</text>
  </g>

  <g font-family="'Inter Tight',system-ui,sans-serif" fill="#F2EAD7">
    <text x="92" y="470" font-size="28" opacity="0.85">SEO classique &amp; GEO — stratégie, contenu, autorité, automatisation.</text>
  </g>

  <!-- Filet or bas -->
  <rect x="92" y="510" width="220" height="3" fill="#B8893C"/>
</svg>
